2" height="76" rx="6" fill="#C6FAF6" stroke="#369E94" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="368" y="712">Embed Query</tspan></text><rect x="562" y="802" width="236" height="76" rx="6" fill="#C6FAF6" stroke="#369E94" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="680" y="840">Vector Search</tspan></text><rect x="1026" y="802" width="252" height="76" rx="6" fill="#C6FAF6" stroke="#369E94" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="1152" y="840">Top-k Rerank</tspan></text><rect x="258" y="978" width="220" height="68" rx="6" fill="#DCCCFF" stroke="#9747FF" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="368" y="1006.24">Shard A</tspan></text><rect x="562" y="978" width="220" height="68" rx="6" fill="#DCCCFF" stroke="#9747FF" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="672" y="1006.24">Shard B</tspan></text><rect x="866" y="978" width="220" height="68" rx="6" fill="#DCCCFF" stroke="#9747FF" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="976" y="1006.24">Shard C</tspan></text><rect x="1026" y="1362" width="252" height="76" rx="6" fill="#FFC2EC" stroke="#F849C1" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="1152" y="1400">Answer Synthesis</tspan></text><rect x="1024" y="1472" width="256" height="48" rx="24" fill="#DDF8E2" stroke="#14AE5C" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="1152" y="1496">Response to User</tspan></text><rect x="258" y="1234" width="716" height="140" rx="6" fill="#FFECBD" stroke="#E8A302" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="616" y="1304">Good for small corpora — a single hop keeps latency low.</tspan></text><rect x="2258" y="610" width="332" height="76" rx="6" fill="#C6FAF6" stroke="#369E94" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2424" y="648">Query Decomposition</tspan></text><rect x="1858" y="770" width="252" height="76" rx="6" fill="#FFE0C2" stroke="#EB7500" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="1984" y="808">Sub-query A</tspan></text><rect x="2738" y="770" width="252" height="76" rx="6" fill="#FFE0C2" stroke="#EB7500" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2864" y="808">Sub-query B</tspan></text><rect x="2306" y="834" width="252" height="108" rx="6" fill="#E6E6E6" stroke="#757575" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2432" y="879">Mode Router</tspan><tspan x="2432" y="897">(sparse vs…</tspan></text><rect x="1858" y="978" width="252" height="76" rx="6" fill="#DCCCFF" stroke="#9747FF" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="1984" y="1021.6">Retriever A</tspan></text><rect x="2738" y="978" width="252" height="76" rx="6" fill="#DCCCFF" stroke="#9747FF" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2864" y="1021.6">Retriever B</tspan></text><rect x="2306" y="1154" width="252" height="76" rx="6" fill="#C6FAF6" stroke="#369E94" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2432" y="1192">Fusion Ranker</tspan></text><rect x="2306" y="1362" width="252" height="76" rx="6" fill="#FFC2EC" stroke="#F849C1" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2432" y="1400">Answer Synthesis</tspan></text><rect x="2304" y="1472" width="256" height="48" rx="24" fill="#DDF8E2" stroke="#14AE5C" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2432" y="1496">Response to User</tspan></text><rect x="2642" y="1330" width="412" height="124" rx="6" fill="#FFECBD" stroke="#E8A302" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="2848" y="1383">Good for complex, multi-part questions —</tspan><tspan x="2848" y="1401">trades latency for recall.</tspan></text><rect x="514" y="1602" width="2236" height="140" rx="6" fill="#FFECBD" stroke="#E8A302" stroke-width="4"/><text fill="#000000" font-size="15" font-weight="700" text-anchor="middle" dominant-baseline="central"><tspan x="1632" y="1672">Tradeoff: single-stage is cheap and fast, but quality caps at one retrieval hop. Multi-stage wins on compound questions at the cost of moving parts. Pick per corpus size and query complexity.</tspan></text><rect x="36" y="36" width="349.36" height="25" rx="6" fill="#E6E6E6" stroke="#C4C4C4" stroke-width="2"/><text x="47" y="48.5" fill="#000000" font-size="16" font-weight="700" text-anchor="start" dominant-baseline="central">Eval Suite S8 — Retrieval Designs</text><rect x="132" y="564" width="240.24" height="25" rx="6" fill="#E6E6E6" stroke="#757575" stroke-width="2"/><text x="143" y="576.5" fill="#000000" font-size="16" font-weight="700" text-anchor="start" dominant-baseline="central">Single-Stage Retrieval</text><rect x="1716" y="564" width="230.32" height="25" rx="6" fill="#E6E6E6" stroke="#757575" stroke-width="2"/><text x="1727" y="576.5" fill="#000000" font-size="16" font-weight="700" text-anchor="start" dominant-baseline="central">Multi-Stage Retrieval</text></svg>